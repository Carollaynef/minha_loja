<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Produto | BC Studio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/produtos.css">

</head>

<body>

    <header>

        <div class="logo">

            <a href="../index.html">

                <h1>BC Studio</h1>

                <span>Elegance in every bead</span>

            </a>

        </div>

    </header>

    <main class="product-page">

        <section class="product-gallery">

            <img id="mainImage" src="" alt="Produto">

        </section>

        <section class="product-details">

            <small id="productCategory"></small>

            <h1 id="productName"></h1>

            <div id="stars"></div>

            <h2 id="productPrice"></h2>

            <p id="productDescription"></p>

            <div class="product-info">

                <p>

                    <strong>Material:</strong>

                    <span id="material"></span>

                </p>

                <p>

                    <strong>Cor:</strong>

                    <span id="color"></span>

                </p>

                <p>

                    <strong>Código:</strong>

                    <span id="code"></span>

                </p>

            </div>

            <div class="buttons">

                <a id="whatsappButton" class="btn-primary" target="_blank">

                    WhatsApp

                </a>

                <a href="https://instagram.com/BijusCarol04" target="_blank" class="btn-secondary">

                    Instagram

                </a>

            </div>

        </section>

    </main>

    <section class="related">

        <h2>

            Você também pode gostar

        </h2>

        <div id="relatedProducts">

        </div>

    </section>

    <footer>

        <h2>

            BC Studio

        </h2>

        <p>

            Elegance in every bead

        </p>

    </footer>

    <script src="../js/produto.js"></script>

</body>

</html>
